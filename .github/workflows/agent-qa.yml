name: QA/Test Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  qa:
    # Trigger on @qa-agent mention in a PR comment (not issue comments)
    if: |
      contains(github.event.comment.body, '@qa-agent') &&
      (github.event.issue.pull_request != null || github.event_name == 'pull_request_review_comment')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov ruff black mypy bandit
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          if [ -f "requirements-dev.txt" ]; then pip install -r requirements-dev.txt; fi

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the QA/Test Agent for GlucoTrack.

            FIRST: Read `.claude/agents/qa-test-agent.md` in full.
            THEN: Read `.specify/memory/constitution.md` in full.

            Your task: Run all quality gates for the current pull request and produce a QA Report.

            Steps:
            1. Run `gh pr view ${{ github.event.issue.number }}` to get the PR details
            2. Find and read the linked spec.md (look in specs/ for the feature branch name)
            3. Run the automated quality gates:
               - pytest tests/ -v (if tests/ exists)
               - pytest tests/ --cov=src --cov-fail-under=80 (if src/ exists)
               - ruff check src/ (if src/ exists)
               - black --check src/ (if src/ exists)
               - bandit -r src/ -ll -ii (if src/ exists)
            4. For each user story in spec.md, describe the acceptance scenario result
            5. Verify multi-user isolation requirements are tested
            6. Produce a QA Report in the exact format from qa-test-agent.md
            7. Post the report as a PR comment:
               gh pr review ${{ github.event.issue.number }} --comment --body "[QA Report]"

            End with either QA APPROVED or QA BLOCKED with specific failures listed.

            You MUST NOT fix code. You MUST NOT approve if any gate fails.
          claude_args: "--max-turns 25"
