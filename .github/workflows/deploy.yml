name: Deploy to Azure

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a running deployment

env:
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
  AZURE_REGISTRY: ${{ secrets.AZURE_REGISTRY }}
  IMAGE_NAME: glucotrack-backend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Azure login ─────────────────────────────────────────────────────
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Build & push container image ────────────────────────────────────
      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.AZURE_REGISTRY }}

      - name: Build and push image
        run: |
          az acr build \
            --registry ${{ env.AZURE_REGISTRY }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file Dockerfile \
            .

      # ── Deploy to production ─────────────────────────────────────────────
      - name: Deploy to production
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.AZURE_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              "TELEGRAM_BOT_TOKEN=secretref:telegram-bot-token" \
              "ANTHROPIC_API_KEY=secretref:anthropic-api-key" \
              "MIRO_ACCESS_TOKEN=secretref:miro-access-token" \
              "MIRO_BOARD_ID=secretref:miro-board-id" \
              "DATABASE_URL=sqlite+aiosqlite:////app/data/glucotrack.db" \
              "STORAGE_ROOT=/app/data"

      - name: Verify deployment
        run: |
          echo "Waiting for revision to be active..."
          sleep 15
          az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.latestRevisionName" \
            --output tsv
          az containerapp revision show \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision $(az containerapp show \
              --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "properties.latestRevisionName" -o tsv) \
            --query "{state:properties.runningState,replicas:properties.replicas}" \
            --output table
